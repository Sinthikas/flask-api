{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
 name: flask-api

spec:
 rules:
  - host: {{ .Values.ingress.host }}
    

    http: 
     - paths: /
       pathType: Prefix

       backend: 
        service: 
         name: flask-api-service
 
         port:
          number: 5000


{{- end }}
